[platformio]
default_envs = m5stack-cardputer-adv

[env:m5stack-cardputer-adv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 460800
monitor_speed = 115200
build_unflags =
    -Os
build_flags =
    -O2
    -DESP32S3
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    M5Cardputer=https://github.com/m5stack/M5Cardputer

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I include
test_build_src = yes
build_src_filter =
    +<pitch_detector.cpp>
    +<note.cpp>

